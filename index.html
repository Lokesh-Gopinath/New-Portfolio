<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#f8f9fa" />
    <meta
      name="description"
      content="Portfolio of Lokesh Gopinath K - Electronics and Communication Engineer"
    />
    <title>Lokesh Gopinath K | Engineer</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              background: "#f8f9fa",
              surface: "#ffffff",
              primary: "#74b9ff",
              secondary: "#a29bfe",
              accent: "#81ecec",
              "text-primary": "#2d3436",
              "text-secondary": "#636e72",
              "neu-light": "#ffffff",
              "neu-shadow": "#d1d1d1",
            },
            fontFamily: {
              sans: ['"Inter"', 'sans-serif'],
              display: ['"Inter"', 'sans-serif'],
              mono: ['"Inter"', 'monospace'],
            },
            boxShadow: {
              'neu': '8px 8px 15px #d1d1d1, -8px -8px 15px #ffffff',
              'neu-sm': '4px 4px 8px #d1d1d1, -4px -4px 8px #ffffff',
              'neu-lg': '12px 12px 24px #d1d1d1, -12px -12px 24px #ffffff',
              'neu-inset': 'inset 4px 4px 8px #d1d1d1, inset -4px -4px 8px #ffffff',
              'neu-pressed': 'inset 6px 6px 12px #d1d1d1, inset -6px -6px 12px #ffffff',
            },
            borderRadius: {
              'neu': '16px',
              'neu-sm': '12px',
              'neu-pill': '50px',
            },
          },
        },
      };
    </script>
    <!-- Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      body {
        background-color: #f8f9fa;
        color: #2d3436;
        overflow-x: hidden;
        font-family: 'Inter', sans-serif;
      }
      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #e9ecef; 
      }
      ::-webkit-scrollbar-thumb {
        background: #b2bec3; 
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #636e72; 
      }
      /* Neumorphic base style */
      .neu-card {
        background: #f0f0f3;
        box-shadow: 8px 8px 15px #d1d1d1, -8px -8px 15px #ffffff;
        border-radius: 16px;
      }
      .neu-card-sm {
        background: #f0f0f3;
        box-shadow: 4px 4px 8px #d1d1d1, -4px -4px 8px #ffffff;
        border-radius: 12px;
      }
      .neu-button {
        background: #f0f0f3;
        box-shadow: 6px 6px 12px #d1d1d1, -6px -6px 12px #ffffff;
        border-radius: 50px;
        transition: all 0.2s ease;
      }
      .neu-button:hover {
        box-shadow: 4px 4px 8px #d1d1d1, -4px -4px 8px #ffffff;
        transform: scale(0.98);
      }
      .neu-button:active {
        box-shadow: inset 4px 4px 8px #d1d1d1, inset -4px -4px 8px #ffffff;
      }
      .neu-inset {
        background: #f0f0f3;
        box-shadow: inset 4px 4px 8px #d1d1d1, inset -4px -4px 8px #ffffff;
        border-radius: 12px;
      }
      .neu-progress {
        background: #e0e0e0;
        border-radius: 50px;
        overflow: hidden;
      }
      .neu-progress-bar {
        background: linear-gradient(135deg, #74b9ff, #a29bfe);
        border-radius: 50px;
        height: 100%;
        transition: width 1s ease;
      }
      /* Smooth transitions */
      * {
        transition: background-color 0.3s ease, box-shadow 0.3s ease, transform 0.2s ease;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
